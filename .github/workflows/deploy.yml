name: CI/CD Weather App

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Build Docker image
      - name: Build Docker image
        run: |
          IMAGE_NAME=weather_app
          docker build -t $IMAGE_NAME:latest .

      # 4️⃣ Save Docker image to tar file
      - name: Save Docker image
        run: docker save weather_app:latest -o weather_app.tar

      # 5️⃣ Clean previous tar on EC2
      # Clean previous tar on EC2
      - name: Clean previous Docker tar on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            rm -rf ~/weather_app.tar

      # Copy Docker image tar to EC2
      - name: Copy Docker image to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: weather_app.tar
          target: ~/weather_app.tar

      # Load and run Docker image
      - name: Load & run Docker image on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker load -i ~/weather_app.tar
            docker stop weather_app || true
            docker rm weather_app || true
            docker run -d --name weather_app -p 80:80 weather_app:latest
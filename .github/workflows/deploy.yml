name: CI/CD Weather App

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          IMAGE_NAME=weather_app
          docker build -t $IMAGE_NAME:latest .
      - name: Save Docker image
        run: docker save myweatherapp:latest -o myweatherapp.tar

      - name: Copy image to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: myweatherapp.tar
          target: ~/myweatherapp.tar

      - name: Load & run image on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker load -i ~/myweatherapp.tar
            docker stop weather_app || true
            docker rm weather_app || true
            docker run -d --name weather_app -p 80:80 myweatherapp:latest